name: Publish Application Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        name: Build and publish ourbox-chat
        uses: docker/build-push-action@v6
        with:
          context: ./apps/ourbox-chat
          push: true
          tags: |
            ghcr.io/techofourown/sw-ourbox-apps-chat/ourbox-chat:latest
            ghcr.io/techofourown/sw-ourbox-apps-chat/ourbox-chat:sha-${{ github.sha }}
      - name: Write publish record
        run: |
          mkdir -p dist
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          record = {
              "schema": 1,
              "kind": "ourbox-application-image-publish-record",
              "app_id": "ourbox-chat",
              "display_name": "OurBox Chat",
              "image_repo": "ghcr.io/techofourown/sw-ourbox-apps-chat/ourbox-chat",
              "default_tag": "latest",
              "pinned_ref": f"ghcr.io/techofourown/sw-ourbox-apps-chat/ourbox-chat@{os.environ['DIGEST']}",
              "digest": os.environ["DIGEST"],
              "github_sha": os.environ["GITHUB_SHA"],
              "github_run_id": os.environ["GITHUB_RUN_ID"],
              "github_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
          }
          Path("dist/ourbox-chat.publish-record.json").write_text(
              json.dumps(record, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
      - uses: actions/upload-artifact@v4
        with:
          name: ourbox-chat-publish-record
          path: dist/ourbox-chat.publish-record.json
